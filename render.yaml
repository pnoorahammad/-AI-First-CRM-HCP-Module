# Render deployment configuration for AI-First CRM HCP Module Backend

services:
  - type: web
    name: ai-crm-hcp-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: LLM_MODEL
        value: gemma2-9b-it
      # Set these in the Render dashboard (sensitive values):
      # GROQ_API_KEY
      # SUPABASE_URL
      # SUPABASE_ANON_KEY
      # SUPABASE_SERVICE_ROLE_KEY
      # FRONTEND_URL (your Vercel URL)
